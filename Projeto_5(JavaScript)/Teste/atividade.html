<!DOCTYPE html> 
<html> 
<head> 
    <meta charset="UTF-8"> 
    <title>Meu bichinho</title> 
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" /> 
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> 
</head> 

<body 
    class="min-h-screen bg-cover bg-center bg-no-repeat" 
    style="background-image: url('FlorestaDia.png');">

    <div class="w-full flex items-center justify-start p-4 gap-4">

    <div class="avatar">
      <div class="w-16 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2">
        <img src="PandaGordoFeliz_IA.png" />
      </div>
    </div>

    <input 
      type="text" 
      placeholder="Nome da criatura..." 
      class="input input-secondary"
    />

  </div>
    
    
    <label class="flex cursor-pointer gap-2">
    <svg
        xmlns="http://www.w3.org/2000/svg"
        width="40"
        height="40"
        viewBox="0 0 24 24"
        fill="none"
        stroke="#FF9800"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round">
        <circle cx="12" cy="12" r="5" />
        <path
        d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4" />
    </svg>
    <input 
    id="tgl" 
    type="checkbox" 
    value="synthwave" 
    class="toggle border-indigo-600 bg-indigo-500 checked:border-orange-500 checked:bg-orange-400 checked:text-orange-800"
    onclick="atualizarFundo()"/>
    <svg
        xmlns="http://www.w3.org/2000/svg"
        width="40"
        height="40"
        viewBox="0 0 24 24"
        fill="none"
        stroke="#3949AB"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
    </label>



    <div class="flex flex-col items-center justify-center min-h-screen px-4 pt-24">
        <img 
        id="main" 
        src="Panda_IA.png" 
        alt="Imagem Principal" 
        class="w-full max-w-md h-auto" /> 
        
        <div class="mt-12 flex justify-center w-full"> 
            <img 
            id="btn" 
            src="morango.png" 
            alt="Botão" 
            class="w-1/3 max-w-[180px] h-auto active:scale-95 transition" 
            onclick="alimentar()" /> 
        </div> 
    </div> 
</body> 
<script src="script.js"></script> </html>
